<!DOCTYPE html>
<html>
<head>
    <title>Flipkart Shopping</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f1f3f6;
            margin: 0;
            padding: 0;
        }

        h1{
            background-color: #2874f0;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h2{
            color: #2874f0;
            margin-left: 20px;
        }

        ol{
            background-color: white;
            width: 60%;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        li{
            margin: 20px 0;
            font-size: 18px;
        }

        button{
            background-color: #fb641b;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 15px;
            font-size: 14px;
        }

        button:hover{
            background-color: #e55b17;
        }
    </style>

</head>

<body>

    <h1>Flipkart Online Store</h1>

    <h2>Mobiles</h2>

    <ol>
        <li>
            iPhone 15 - ₹79,999
            <button>Buy Now</button>
        </li>

        <li>
            Samsung Galaxy - ₹45,000
            <button>Add to Cart</button>
        </li>

        <li>
            Realme 12 Pro - ₹25,000
            <button>Shop Now</button>
        </li>
    </ol>

    <h2>Fashion</h2>

    <ol>
        <li>
            Men T-Shirt - ₹699
            <button>Buy Now</button>
        </li>

        <li>
            Shoes - ₹1,999
            <button>Add to Cart</button>
        </li>

        <li>
            Hand Bag - ₹1,299
            <button>Shop Now</button>
        </li>
    </ol>

    <h2>Electronics</h2>

    <ol>
        <li>
            Laptop - ₹55,000
            <button>Buy Now</button>
        </li>

        <li>
            Headphones - ₹2,500
            <button>Add to Cart</button>
        </li>

        <li>
            Smart TV - ₹35,000
            <button>Shop Now</button>
        </li>
    </ol>

</body>
</html>
